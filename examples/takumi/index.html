<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Takumi + Nitro — OG Images</title>

    <!-- Open Graph / social preview, rendered on the fly by /og.png -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Takumi + Nitro" />
    <meta property="og:description" content="Render OG images from a Nitro route." />
    <meta
      property="og:image"
      content="/og.png?title=Takumi%20%2B%20Nitro&description=Render%20OG%20images%20from%20a%20Nitro%20route."
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og.png" />

    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(to bottom right, #fff1f2, #fecdd3);
        color: #111827;
      }
      .card {
        width: 100%;
        max-width: 680px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 45px rgba(190, 24, 93, 0.15);
      }
      h1 {
        margin: 0 0 4px;
        font-size: 28px;
      }
      p.lead {
        margin: 0 0 20px;
        color: #4b5563;
      }
      img.preview {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 20px 0 8px;
      }
      .controls input {
        flex: 1 1 200px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        font-size: 14px;
      }
      .controls button {
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        background: #be185d;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      .controls button:hover {
        background: #9d174d;
      }
      code {
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        background: rgba(0, 0, 0, 0.06);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Takumi + Nitro</h1>
      <p class="lead">
        The image below is generated at request time by the
        <code>routes/og.png.ts</code> handler.
      </p>

      <img
        id="preview"
        class="preview"
        alt="Generated Open Graph image"
        src="/og.png?title=Takumi%20%2B%20Nitro&description=Render%20OG%20images%20from%20a%20Nitro%20route."
      />

      <div class="controls">
        <input id="title" placeholder="Title" value="Takumi + Nitro" />
        <input
          id="description"
          placeholder="Description"
          value="Render OG images from a Nitro route."
        />
        <button id="generate">Generate</button>
      </div>
      <p class="lead">
        Endpoint:
        <code>/og.png?title=Hello&amp;description=From%20Nitro</code>
      </p>
    </main>

    <script>
      const preview = document.getElementById("preview");
      const titleInput = document.getElementById("title");
      const descInput = document.getElementById("description");

      document.getElementById("generate").addEventListener("click", () => {
        const params = new URLSearchParams({
          title: titleInput.value,
          description: descInput.value,
        });
        preview.src = `/og.png?${params.toString()}`;
      });
    </script>
  </body>
</html>
