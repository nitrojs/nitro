packages:
  - examples/**
  - playground
  - test/fixture
  - test/minimal

ignoreWorkspaceRootCheck: true

allowBuilds:
  keytar: false
  protobufjs: false
  vue-demi: false
  '@parcel/watcher': true
  esbuild: true
  ocache: true
  sharp: true
  workerd: true

dedupePeers: true

peerDependencyRules:
  ignoreMissing:
    - react
    - '@types/react'
    - react-dom
    - '@algolia/client-search'

shellEmulator: true

# typescript-eslint is affected by
# https://github.com/pnpm/pnpm/issues/10329
# trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - tailwind-merge@2.6.0
  - '@headlessui/vue@1.7.23'
  - undici-types@6.21.0
  - rxjs@7.8.2
  - semver@6.3.1
